<script>
const I18N={zh:{brand:'NYC Airbnb · 双语分析平台',kicker:'探索性数据分析 · 个性化推荐',hero_title:'纽约 Airbnb\n房源数据分析',hero_lede:'基于 Inside Airbnb 纽约房源数据，从数据概览出发，逐层深入到单变量、双变量、多维交叉，最后扩展为面向不同人群的个性化推荐系统。<b>整租房源和曼哈顿房源价格更高；但全市真正在运营的房源只有约 28%。</b>',stat_listings:'房源数',stat_avg_price:'均价',stat_active:'真活跃占比',stat_zombie:'僵尸库存',guide_title:'报告导览',guide_text:'报告沿“先理解、再探索、后推荐”的顺序展开；末尾加入地图与个性化推荐功能。颜色标明阶段：探索分析、核心洞察、行动建议与进阶推荐。',tag_explore:'探索',tag_insight:'洞察',tag_action:'行动',tag_advanced:'进阶',tag_reco:'推荐系统',what_label:'这一板块做什么',card1_title:'数据概览与质量',card1_text:'先认清数据本身：规模、字段、一行代表什么、质量如何。',card2_title:'单变量分析',card2_text:'逐个字段看分布，掌握每个变量的基本形态。',card3_title:'双变量分析',card3_text:'两两字段看关系：价格、地段、房型之间怎么联动。',card4_title:'多维交叉与分群',card4_text:'多个维度一起看，把房源切成可解释的群体。',card5_title:'核心洞察',card5_text:'把前面的规律收敛成几条关键结论。',card6_title:'行动建议',card6_text:'把结论落成可执行动作，并扣回具体数字。',card7_title:'房东 / 合规 / 可达性 / 推荐',card7_text:'接入更多字段后，进一步分析 Superhost、房东商业化、地理可达性、评分拆解与个性化推荐。',b0_title:'数据概览与质量',b0_what:'拿到数据先认清它本身：规模、字段、一行代表什么、质量如何。后面所有分析都建立在这一步之上。',b0_li1:'<b>粒度与主键。</b>一行一个房源，共 36,445 行。由于 <code>id</code> 列可能存在 float64 精度损坏，建议改用 <code>listing_url</code> 作为主键。',b0_li2:'<b>价格概览。</b>价格区间 $93–300，均价 $132，中位 $120。价格分布高度集中，42.6% 的房源正好是 $120，高于 $200 的仅 8.3%。',b0_li3:'<b>地段与房型字段齐全。</b>行政区、社区、经纬度、房型和容量字段可支撑地理与房型分析。',b0_li4:'<b>缺失是结构性的。</b>70.5% 的房源近一年零评论，部分评分、床位和卫生间字段缺失较高。缺失本身可能是不活跃信号，不宜无脑插补。',fig1:'图 1 · 价格分布。绝大多数房源落在 $115–120，中位数为 $120；高价房源（>$200）仅占 8.3%。',b1_title:'单变量分析',b1_what:'逐个字段单独看分布，掌握每个变量的基本形态，为后面的关系分析打底。',b1_li1:'<b>地段高度集中。</b>曼哈顿 44.9% + 布鲁克林 36.4% 约占八成。',b1_li2:'<b>房型近乎二元。</b>整租房源 53.3%，独立房间 45.1%，酒店和合住合计不到 2%。',b1_li3:'<b>容量偏小。</b><code>accommodates</code> 中位数为 2，中位 1 间卧室。',b1_li4:'<b>可订性两极分化。</b><code>availability_365</code> 有 33.5% 是 0，同时 36% 落在 181–364 天的高可订区。',b1_li5:'<b>活动度普遍较低。</b>近 12 个月评论中位数为 0；有评分的房源中位评分为 4.86。',b2_title:'双变量分析',b2_what:'把字段两两组合看关系：价格、地段、房型和可订性之间如何联动。',b2_p1:'<b>价格随地段和房型变化。</b>整租房源在每个区都比独立房间贵约 15–30%；曼哈顿整体均价最高（$139），皇后区最低（$121）。',legend_entire:'整租房源',legend_private:'独立房间',legend_entire_short:'整租',legend_private_short:'独立房间',legend_other:'酒店 / 合住',fig2:'图 2 · 各行政区 × 房型的均价。整租房源在各区均高于独立房间。',b2_p2:'<b>房型构成也随地段变化。</b>曼哈顿整租占比最高，外围行政区更偏独立房间。曼哈顿更像“整租公寓”市场，外围更像“分租房间”市场。',fig3:'图 3 · 各行政区按房型构成（每行占比 100%）。',b2_li1:'<b>活跃房源是少数。</b>把“可订且近一年有评论”定义为活跃，只有 28.3% 满足。',b2_li2:'<b>活跃房源内部出现反转。</b>曼哈顿活跃房源月评论中位数最低，而布鲁克林和皇后区更高。',b2_li3:'<b>房源最密的社区：</b>Bed-Stuy、Midtown、Williamsburg、Harlem、Hell’s Kitchen。',b3_title:'多维交叉与分群',b3_what:'多个维度一起看，把房源切成可识别的群体，看清市场结构。',b3_p:'用“可订性 × 近期活动”两个维度，把全部 36,445 个房源切成四群：',seg1:'真活跃 · 可订且近一年被订过 — <b>10,327</b>',seg2:'挂着没人订 · 可订但近一年零评论 — <b>13,903</b>',seg3:'订满 / 暂停 · 不可订但有近评 — <b>415</b>',seg4:'僵尸 · 不可订且近一年零评论 — <b>11,800</b>',fig4:'图 4 · 全部房源按“可订性 × 近一年是否被订过”分成四群。真活跃仅占 28.3%。',b3_li1:'<b>真活跃只占 28.3%。</b>最大的一群是“可订但近一年零评论”，说明很多房源挂在平台上但没有近期交易。',b3_li2:'<b>僵尸化相对均匀。</b>这一分布在不同房型和行政区中都较相近，更像受到全市性政策或平台环境影响。',bk_title:'核心洞察',bk_what:'把前面四块的规律收敛成几条解释现象的关键结论。',ins1:'<b>价格结构清晰但温和。</b>整租处处高于独立房间，曼哈顿整体最高；但价格高度集中在 $120 附近，是一个中端为主、溢价有限的市场。',ins2:'<b>房源数严重高估真实市场。</b>36k 房源里只有约 1 万真正在运营，最大群体是挂着却没有近期成交的房源。',ins3:'<b>僵尸化是全市性的。</b>大量房源处于低活跃或不可订状态，可能与短租监管、平台规则和市场需求共同相关。',ins4:'<b>真实运行的是更小、更集中的市场。</b>核心区域以曼哈顿和布鲁克林为主，房型上整租与独立房间并存。',bd_title:'行动建议',bd_what:'把结论落成可执行动作，每条都扣回具体数字与字段。',step1_t:'① 分析前先理清字段',step1_p:'用 <code>listing_url</code> 作为主键，避免大型数字 id 精度问题；派生辅助字段在房源级分析中可忽略。',step2_t:'② 市场 / 运营分析先过滤活跃房源',step2_p:'用 <code>active = availability_365 > 0 且 number_of_reviews_ltm > 0</code> 过滤到约 1.03 万个活跃房源再分析。',step3_t:'③ 价格分析按房型 × 地段拆分',step3_p:'由于价格集中在 $120，分组比较时优先看均价，并重点解释整租溢价和分区差异。',step4_t:'④ 供给 / 监管视角保留全量',step4_p:'看低活跃和僵尸库存占比，以及其在各区和房型间的分布，可作为市场结构和监管影响的描述性证据。',step5_t:'⑤ 地理投放要分人群',step5_p:'曼哈顿适合高价低频与游客，布鲁克林 / 皇后区更适合高周转和预算敏感用户。',ext_kicker:'延伸分析 · 接入更多数据',ext_title:'合并房东 / 合规 / 可达性数据之后',ext_what:'原报告只用精简表。接入同源 Inside Airbnb 的房东、合规和细分评分字段后，可以做价格 × 房东、价格 × 合规、价格 × 地理可达性等交叉分析。',ext_stat1:'合并后字段',ext_stat2:'行对齐',ext_stat3:'新增维度',ext_stat3v:'房东 · 合规 · 地段',a7_title:'Superhost 真的更贵吗',a7_what:'把价格与 <code>host_is_superhost</code> 交叉，看“超赞房东”标签是否对应更高标价。',a7_li1:'<b>整体几乎没有溢价。</b>Superhost 均价 $134.2，普通房东 $131.8，只贵 1.8%。',a7_li2:'<b>按房型拆开才看出分化。</b>酒店房 Superhost 溢价最明显，整租略贵，独立房间反而略低。',a7_li3:'<b>结论：</b>Superhost 更像“同价更好”，而不是显著提价。',legend_regular:'普通房东',fig5:'图 5 · 各房型下 Superhost vs 普通房东的均价。酒店房溢价最明显，独立房间略低。',a8_title:'房东越商业化，价格和合规怎么变',a8_what:'用 <code>calculated_host_listings_count</code> 把房东分成个人、小型、中型和大型职业四档，观察价格、License 合规率和活跃度。',a8_li1:'<b>大型职业房东定价最高。</b>但近 12 月评论较低，呈现高价低周转特征。',a8_li2:'<b>合规率不是越大越高。</b>中型房东最高，大型职业房东反而回落。',a8_li3:'<b>真正跑量的是小型 / 中型房东。</b>近年评论高于个人和大型职业房东。',legend_avg_price:'均价（左轴）',legend_license:'License 合规率（右轴）',fig6:'图 6 · 按房东持有房源数分档的均价与 License 合规率。价格随规模上升，但合规率在中型房东处见顶。',a9_title:'地段值多少钱',a9_what:'用经纬度计算到大学、旅游核心、华人社区和机场的综合便利性评分，再与价格做相关。',a9_li1:'<b>便利性与价格中等正相关。</b>Spearman 相关约 0.445，便利性越高，均价整体上行。',a9_li2:'<b>但地段不是全部。</b>同一便利度内部仍有很大价格差异。',fig7:'图 7 · 地理便利性评分 × 均价。便利性越高，均价整体上行，但关系并非完全线性。',a10_title:'贵，贵在哪个评价维度',a10_what:'把价格与总评、位置、清洁、性价比四个细分评分分别求相关，观察高价对应哪类口碑。',a10_li1:'<b>四个维度与价格相关都较弱。</b>位置最高，其次是总评、清洁，性价比几乎为零。',a10_li2:'<b>位置相关最高。</b>这呼应“地段值钱”的结论。',a10_li3:'<b>低价不必然更划算。</b>最低价档的性价比评分反而低于中价档。',fig8:'图 8 · 各评分维度与价格的 Spearman 相关。位置最高、性价比最低。',a11_title:'综合推荐榜（规则加权）',a11_what:'不动用 LLM，用规则把便利性、总评、近期活跃和性价比合成 0–1 推荐分，作为推荐网站雏形。',a11_li1:'<b>推荐分最高的社区集中在曼哈顿下城 / 中城。</b>Nolita、Chinatown、Little Italy、Theater District 等领先。',a11_li2:'<b>Top 房源多为核心区独立房间。</b>它们便利、活跃、评分高，且不算最贵。',fig9:'图 9 · 推荐分最高的社区。分数集中在 0.73–0.76，可结合预算与偏好进一步筛选。',reco_title:'按预算与身份推荐房源',reco_what:'把固定推荐分升级为个性化推荐：先按预算筛选，再根据用户身份切换目标地点和权重。学生看到学校，上班族看到商务区/公司，游客看到景点，高预算用户看到高端地段。',budget_min:'最低预算 / 晚',budget_max:'最高预算 / 晚',persona_label:'用户身份',target_label:'目标地点',room_pref:'房型偏好',min_rating:'最低评分',run_btn:'生成推荐',map_title:'推荐地图',map_listing:'推荐房源 / 社区',map_target:'目标地点',map_subway:'附近地铁站',map_note:'真实交互地图：底图来自 OpenStreetMap/CARTO，绿色为推荐房源/社区，橙色为目标地点，蓝色为附近地铁站。可缩放、拖动、点击查看详情。',th_rank:'排名',th_listing:'推荐社区 / 房型',th_price:'均价',th_rating:'评分',th_score:'推荐分',th_reason:'推荐理由',extension_num:'延伸',final_title:'延伸部分的四条结论',final_what:'把合并数据后新增的交叉分析收敛成可汇报的关键结论。',final1:'<b>Superhost 靠口碑不靠溢价。</b>整体只贵 1.8%，中位数同价，超赞房东标签更多体现为同价更好。',final2:'<b>大型职业房东是高价低周转群体。</b>定价更高但活跃度较低，适合作为“运营与监管”故事线切入点。',final3:'<b>地段值钱，但不是全部。</b>便利性与价格相关中等，位置评分与价格相关最高，性价比与价格几乎无关。',final4:'<b>推荐价值集中在曼哈顿下城 / 中城。</b>但社区分数接近，真正区分还需叠加个人偏好与预算。',footer:'Data source: Inside Airbnb NYC dataset. This website is an academic and non-commercial prototype. Scores are rule-based and should not be interpreted as official Airbnb recommendations.'},
en:{brand:'NYC Airbnb · Bilingual Analytics Platform',kicker:'Exploratory Data Analysis · Personalized Recommendation',hero_title:'NYC Airbnb\nListing Analysis',hero_lede:'Based on the Inside Airbnb NYC dataset, this site moves from data overview to univariate analysis, bivariate analysis, multidimensional segmentation, and finally a personalized recommendation system for different user groups. <b>Entire homes and Manhattan listings are priced higher, but only about 28% of listings appear to be truly active.</b>',stat_listings:'Listings',stat_avg_price:'Avg price',stat_active:'Active share',stat_zombie:'Zombie inventory',guide_title:'Report Guide',guide_text:'The report follows a “understand first, explore next, recommend last” structure. It ends with an interactive map and a personalized recommendation module. Colors indicate exploratory analysis, key insights, actionable recommendations, and advanced recommendation features.',tag_explore:'Explore',tag_insight:'Insight',tag_action:'Action',tag_advanced:'Advanced',tag_reco:'Recommendation',what_label:'What this section does',card1_title:'Data Overview & Quality',card1_text:'Understand the dataset itself: scale, fields, observation unit, and data quality.',card2_title:'Univariate Analysis',card2_text:'Inspect each variable separately to understand its basic distribution.',card3_title:'Bivariate Analysis',card3_text:'Examine pairwise relationships among price, location, and room type.',card4_title:'Multidimensional Segmentation',card4_text:'Segment listings into interpretable groups using multiple dimensions.',card5_title:'Key Insights',card5_text:'Condense the patterns into several core findings.',card6_title:'Actionable Recommendations',card6_text:'Translate findings into practical actions tied to concrete metrics.',card7_title:'Host / Compliance / Accessibility / Recommendation',card7_text:'After adding more fields, the analysis extends to Superhost, host commercialization, geographic accessibility, rating decomposition, and personalized recommendation.',b0_title:'Data Overview & Quality',b0_what:'The first step is to understand the dataset itself: its scale, fields, observation unit, and data quality. All later analysis builds on this foundation.',b0_li1:'<b>Observation unit and key.</b> Each row is one listing, with 36,445 rows in total. Because the numeric <code>id</code> field may suffer from float64 precision issues, <code>listing_url</code> is a safer primary key.',b0_li2:'<b>Price overview.</b> Prices range from $93 to $300, with an average of $132 and a median of $120. The distribution is highly concentrated: 42.6% of listings are exactly $120, while only 8.3% exceed $200.',b0_li3:'<b>Location and room-type fields are available.</b> Borough, neighbourhood, coordinates, room type, and capacity support location and room-type analysis.',b0_li4:'<b>Missingness is structural.</b> 70.5% of listings have zero reviews in the past year, and some rating, bed, and bathroom fields have substantial missingness. Missing values may themselves signal inactivity and should not be blindly imputed.',fig1:'Figure 1 · Price distribution. Most listings fall between $115 and $120, with a median of $120; high-price listings above $200 account for only 8.3%.',b1_title:'Univariate Analysis',b1_what:'This section examines each field separately to understand the basic shape of the data before studying relationships.',b1_li1:'<b>Location is highly concentrated.</b> Manhattan accounts for 44.9% and Brooklyn for 36.4%, together representing roughly 80% of all listings.',b1_li2:'<b>Room types are almost binary.</b> Entire homes account for 53.3%, private rooms for 45.1%, while hotel and shared rooms together account for less than 2%.',b1_li3:'<b>Capacity is small.</b> The median <code>accommodates</code> value is 2, and the median number of bedrooms is 1.',b1_li4:'<b>Availability is polarized.</b> 33.5% of listings have <code>availability_365</code> equal to zero, while 36% fall in the high-availability range of 181–364 days.',b1_li5:'<b>Activity is generally low.</b> The median number of reviews in the past 12 months is zero; among rated listings, the median rating is 4.86.',b2_title:'Bivariate Analysis',b2_what:'This section combines fields pairwise to understand how price, location, room type, and availability move together.',b2_p1:'<b>Price varies by location and room type.</b> Entire homes are about 15–30% more expensive than private rooms in every borough. Manhattan has the highest average price ($139), while Queens has the lowest ($121).',legend_entire:'Entire home/apt',legend_private:'Private room',legend_entire_short:'Entire home',legend_private_short:'Private room',legend_other:'Hotel / shared',fig2:'Figure 2 · Average price by borough and room type. Entire homes are more expensive than private rooms across boroughs.',b2_p2:'<b>Room-type composition also varies by location.</b> Manhattan has the highest share of entire homes, while outer boroughs rely more heavily on private rooms. Manhattan looks more like an “entire-apartment” market; outer boroughs look more like a “room-rental” market.',fig3:'Figure 3 · Room-type composition by borough, with each row normalized to 100%.',b2_li1:'<b>Active listings are the minority.</b> Defining active listings as available and reviewed in the past year, only 28.3% meet the criterion.',b2_li2:'<b>There is a reversal within active listings.</b> Active Manhattan listings have the lowest median monthly reviews, while Brooklyn and Queens are higher.',b2_li3:'<b>The densest neighbourhoods include:</b> Bed-Stuy, Midtown, Williamsburg, Harlem, and Hell’s Kitchen.',b3_title:'Multidimensional Segmentation',b3_what:'This section combines multiple dimensions to divide listings into interpretable market segments.',b3_p:'Using availability and recent activity, all 36,445 listings are divided into four groups:',seg1:'Truly active · Available and reviewed in the past year — <b>10,327</b>',seg2:'Listed but not booked · Available but zero recent reviews — <b>13,903</b>',seg3:'Fully booked / paused · Unavailable but recently reviewed — <b>415</b>',seg4:'Zombie · Unavailable and zero recent reviews — <b>11,800</b>',fig4:'Figure 4 · Listings segmented by availability and recent review activity. Truly active listings account for only 28.3%.',b3_li1:'<b>Only 28.3% are truly active.</b> The largest group is “available but with zero recent reviews,” suggesting many listings are visible but not transacting recently.',b3_li2:'<b>Zombie inventory is relatively citywide.</b> The pattern is similar across room types and boroughs, suggesting market-wide policy or platform-environment effects.',bk_title:'Key Insights',bk_what:'This section condenses the previous patterns into several core findings.',ins1:'<b>The price structure is clear but moderate.</b> Entire homes are more expensive than private rooms, and Manhattan is highest overall; however, prices cluster around $120, suggesting a mid-market with limited premium tails.',ins2:'<b>Listing count seriously overstates the real market.</b> Among 36k listings, only about 10k appear to be truly active; the largest group is listed but not transacting recently.',ins3:'<b>Zombie inventory appears citywide.</b> Many listings are inactive or unavailable, likely reflecting a combination of short-term rental regulation, platform rules, and market demand.',ins4:'<b>The functioning market is smaller and more concentrated.</b> It is centered on Manhattan and Brooklyn, with both entire homes and private rooms playing important roles.',bd_title:'Actionable Recommendations',bd_what:'This section translates findings into practical actions tied to specific fields and metrics.',step1_t:'① Clarify fields before analysis',step1_p:'Use <code>listing_url</code> as the key to avoid precision issues in large numeric IDs; derived helper fields can be ignored for listing-level analysis.',step2_t:'② Filter to active listings for market analysis',step2_p:'Use <code>active = availability_365 > 0 and number_of_reviews_ltm > 0</code> to focus on roughly 10.3k active listings.',step3_t:'③ Split price analysis by room type and location',step3_p:'Because prices cluster around $120, use group means and emphasize entire-home premiums and borough differences.',step4_t:'④ Use full listings for supply and regulation views',step4_p:'Low-activity and zombie shares, and their distribution across boroughs and room types, provide descriptive evidence of market structure and regulatory effects.',step5_t:'⑤ Target geographically by user group',step5_p:'Manhattan fits high-price, lower-frequency and tourist segments, while Brooklyn and Queens fit higher-turnover and budget-sensitive users.',ext_kicker:'Extended analysis · More data added',ext_title:'After Adding Host / Compliance / Accessibility Data',ext_what:'The original report used a simplified table. By adding host, compliance, and detailed rating fields from the same Inside Airbnb source, the analysis can cross price with host type, compliance, and geographic accessibility.',ext_stat1:'Fields after merge',ext_stat2:'Rows aligned',ext_stat3:'New dimensions',ext_stat3v:'Host · Compliance · Location',a7_title:'Are Superhosts Really More Expensive?',a7_what:'This section crosses price with <code>host_is_superhost</code> to see whether the Superhost badge corresponds to higher list prices.',a7_li1:'<b>There is almost no overall premium.</b> Superhosts average $134.2 versus $131.8 for regular hosts, only 1.8% higher.',a7_li2:'<b>The pattern appears only after splitting by room type.</b> Hotel rooms show the strongest Superhost premium, entire homes are slightly higher, while private rooms are slightly lower.',a7_li3:'<b>Conclusion:</b> Superhost is more about “better at the same price” than clear price increases.',legend_regular:'Regular host',fig5:'Figure 5 · Average price by room type for Superhosts and regular hosts. Hotel rooms show the strongest premium, while private rooms are slightly lower.',a8_title:'How Host Commercialization Relates to Price and Compliance',a8_what:'Using <code>calculated_host_listings_count</code>, hosts are classified into individual, small, medium, and large professional groups to compare price, license rate, and activity.',a8_li1:'<b>Large professional hosts have the highest prices.</b> But their recent reviews are lower, suggesting a high-price, low-turnover pattern.',a8_li2:'<b>Compliance does not rise monotonically with scale.</b> Medium hosts have the highest license rate, while large professional hosts fall back.',a8_li3:'<b>Small and medium hosts drive volume.</b> Their recent reviews are higher than those of individual and large professional hosts.',legend_avg_price:'Average price (left axis)',legend_license:'License rate (right axis)',fig6:'Figure 6 · Average price and license rate by host scale. Price rises with scale, while license rate peaks among medium hosts.',a9_title:'How Much Is Location Worth?',a9_what:'Coordinates are converted into accessibility scores to universities, tourist cores, Chinese communities, and airports, then correlated with price.',a9_li1:'<b>Accessibility has a moderate positive relationship with price.</b> The Spearman correlation is about 0.445; average price generally rises with accessibility.',a9_li2:'<b>But location is not everything.</b> There is still large price variation within the same accessibility level.',fig7:'Figure 7 · Geographic accessibility score and average price. Price generally rises with accessibility, but the relationship is not perfectly linear.',a10_title:'What Rating Dimension Explains Higher Prices?',a10_what:'This section correlates price with overall rating, location, cleanliness, and value to see which reputation dimension is most associated with higher prices.',a10_li1:'<b>All four correlations are weak.</b> Location is highest, followed by overall rating and cleanliness; value is nearly zero.',a10_li2:'<b>Location has the highest correlation.</b> This supports the idea that location is the most price-relevant rating dimension.',a10_li3:'<b>Lower price does not necessarily mean better value.</b> The cheapest price bin has lower value ratings than the mid-price bin.',fig8:'Figure 8 · Spearman correlations between price and rating dimensions. Location is highest and value is lowest.',a11_title:'Composite Recommendation Ranking',a11_what:'Without using an LLM, a rule-based score combines accessibility, overall rating, recent activity, and value into a 0–1 recommendation score.',a11_li1:'<b>Top-scoring neighbourhoods are concentrated in Lower and Midtown Manhattan.</b> Nolita, Chinatown, Little Italy, and Theater District rank highly.',a11_li2:'<b>Top listings are often core-area private rooms.</b> They are convenient, active, well-rated, and not among the most expensive options.',fig9:'Figure 9 · Neighbourhoods with the highest recommendation scores. Scores cluster around 0.73–0.76, so budget and personal preference should be layered on top.',reco_title:'Recommend Listings by Budget and Persona',reco_what:'The fixed recommendation score is upgraded into a personalized system: it first filters by budget, then changes target locations and weights according to the user persona. Students see universities, commuters see business districts or company areas, tourists see attractions, and comfort-first users see premium neighbourhoods.',budget_min:'Minimum budget / night',budget_max:'Maximum budget / night',persona_label:'User persona',target_label:'Target location',room_pref:'Room preference',min_rating:'Minimum rating',run_btn:'Generate recommendations',map_title:'Recommendation Map',map_listing:'Recommended listing / area',map_target:'Target location',map_subway:'Nearby subway station',map_note:'Interactive map: base map from OpenStreetMap/CARTO. Green markers are recommended listings or areas, orange markers are target locations, and blue markers are nearby subway stations. You can zoom, drag, and click markers for details.',th_rank:'Rank',th_listing:'Recommended area / room type',th_price:'Avg price',th_rating:'Rating',th_score:'Score',th_reason:'Reason',extension_num:'Extension',final_title:'Four Takeaways from the Extended Analysis',final_what:'The additional cross-dimensional analysis can be summarized into four reportable conclusions.',final1:'<b>Superhosts rely on reputation rather than price premiums.</b> They are only 1.8% more expensive overall, suggesting the badge signals better value at similar prices.',final2:'<b>Large professional hosts are high-price and low-turnover.</b> They charge more but appear less active, making them a useful angle for the operations-and-regulation story.',final3:'<b>Location is valuable, but not everything.</b> Accessibility is moderately correlated with price; location rating has the highest price correlation, while value rating is nearly unrelated.',final4:'<b>Recommendation value is concentrated in Lower and Midtown Manhattan.</b> But neighbourhood scores are close, so personal preference and budget are needed for final differentiation.',footer:'Data source: Inside Airbnb NYC dataset. This website is an academic and non-commercial prototype. Scores are rule-based and should not be interpreted as official Airbnb recommendations.'}}

let lang=localStorage.getItem('airbnbLang')||'zh', charts={}, map, markers=[];
function tr(k){return I18N[lang][k]||I18N.en[k]||k}
function applyI18n(){document.documentElement.lang=lang==='zh'?'zh-CN':'en';document.querySelectorAll('[data-i18n]').forEach(el=>{el.innerHTML=tr(el.dataset.i18n)});document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));document.title=lang==='zh'?'纽约 Airbnb 个性化推荐地图':'NYC Airbnb Personalized Recommendation Map';populateSelects();updateCharts();runRecommendation();}
function populateSelects(){let p=document.getElementById('persona'), old=p.value||'student';p.innerHTML=PERSONAS[lang].map(([v,t])=>`<option value="${v}">${t}</option>`).join('');p.value=old;let room=document.getElementById('roomPref'), oldr=room.value||'any';room.innerHTML=ROOM_OPTIONS[lang].map(([v,t])=>`<option value="${v}">${t}</option>`).join('');room.value=oldr;populateTargets();}
function populateTargets(){let persona=document.getElementById('persona').value||'student';let target=document.getElementById('target'), old=target.value;target.innerHTML=TARGETS[persona].map(x=>`<option value="${x.name}">${x.name}</option>`).join('');if([...target.options].some(o=>o.value===old)) target.value=old;}
function distKm(a,b){const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;return 2*R*Math.asin(Math.sqrt(x));}
function weights(persona){return {student:{distance:.35,value:.25,access:.20,rating:.20},worker:{distance:.35,access:.25,rating:.20,comfort:.20},tourist:{distance:.35,access:.25,active:.20,rating:.20},luxury:{comfort:.35,rating:.30,distance:.15,access:.10,value:.10},chinese:{distance:.35,value:.20,access:.20,rating:.15,active:.10}}[persona]}
function reason(item,d,score){if(lang==='zh')return `距离目标点约 ${d.toFixed(1)} km；评分 ${item.rating.toFixed(2)}；均价 $${item.price}；综合推荐分 ${score.toFixed(3)}。`;return `About ${d.toFixed(1)} km from the target; rating ${item.rating.toFixed(2)}; average price $${item.price}; recommendation score ${score.toFixed(3)}.`}
function runRecommendation(){if(!document.getElementById('persona')) return;let min=+document.getElementById('budgetMin').value||0,max=+document.getElementById('budgetMax').value||999,persona=document.getElementById('persona').value,room=document.getElementById('roomPref').value,minRating=+document.getElementById('minRating').value||0,target=TARGETS[persona].find(x=>x.name===document.getElementById('target').value)||TARGETS[persona][0],w=weights(persona);let rows=LISTINGS.filter(x=>x.price>=min&&x.price<=max&&x.rating>=minRating&&(room==='any'||x.room===room)).map(x=>{let d=distKm(x,target),distanceScore=Math.max(0,1-d/12);let score=(w.distance||0)*distanceScore+(w.value||0)*x.value+(w.access||0)*x.access+(w.rating||0)*(x.rating/5)+(w.comfort||0)*x.comfort+(w.active||0)*x.active;return {...x,d,score,reason:reason(x,d,score)}}).sort((a,b)=>b.score-a.score).slice(0,6);document.getElementById('recoExplain').innerHTML=lang==='zh'?`当前画像会优先考虑：${document.querySelector('#persona option:checked').textContent}；目标地点：${target.name}；预算区间：$${min}–$${max}。`:`Current persona: ${document.querySelector('#persona option:checked').textContent}; target: ${target.name}; budget range: $${min}–$${max}.`;document.getElementById('recoBody').innerHTML=rows.map((r,i)=>`<tr><td>${i+1}</td><td><b>${r.name}</b><br><span class="reason">${r.room}</span></td><td>$${r.price}</td><td>${r.rating.toFixed(2)}</td><td><span class="score-pill">${r.score.toFixed(3)}</span></td><td class="reason">${r.reason}</td></tr>`).join('')||`<tr><td colspan="6">${lang==='zh'?'没有符合条件的推荐结果。':'No matching recommendations.'}</td></tr>`;updateMap(target,rows)}
function initMap(){if(!window.L||map) return;map=L.map('recoMap',{scrollWheelZoom:false}).setView([40.735,-73.98],11);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map);setTimeout(()=>map.invalidateSize(),200)}
function clearMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[]}
function icon(color){return L.divIcon({className:'',html:`<div style="width:15px;height:15px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 1px 6px rgba(0,0,0,.35)"></div>`,iconSize:[18,18],iconAnchor:[9,9]})}
function updateMap(target,rows){initMap();if(!map)return;clearMarkers();markers.push(L.marker([target.lat,target.lng],{icon:icon('#D85A30')}).addTo(map).bindPopup(`<div class="popup-title">${target.name}</div><div class="popup-meta">${tr('map_target')}</div>`));markers.push(L.circle([target.lat,target.lng],{radius:1500,color:'#D85A30',fillColor:'#D85A30',fillOpacity:.08,weight:1}).addTo(map));rows.forEach(r=>markers.push(L.marker([r.lat,r.lng],{icon:icon('#1D9E75')}).addTo(map).bindPopup(`<div class="popup-title">${r.name}</div><div class="popup-meta">${r.room}<br>$${r.price} · ${r.rating.toFixed(2)} · ${tr('th_score')} ${r.score.toFixed(3)}</div>`)));SUBWAYS.filter(s=>distKm(s,target)<3.5).slice(0,5).forEach(s=>markers.push(L.marker([s.lat,s.lng],{icon:icon('#2F7FCC')}).addTo(map).bindPopup(`<div class="popup-title">${s.name}</div><div class="popup-meta">${tr('map_subway')}</div>`)));let group=L.featureGroup(markers.filter(m=>m.getLatLng));if(markers.length>1)map.fitBounds(group.getBounds().pad(.2));setTimeout(()=>map.invalidateSize(),100)}
function chartText(){return lang==='zh'?{count:'房源数',avg:'均价 (USD)',entire:'整租',private:'独立房间',other:'酒店/合住',regular:'普通房东',license:'License率',access:'地理便利性评分（越右越便利）',corr:'与价格的 Spearman 相关',score:'平均推荐分 (0–1)',priceDist:'房源数'}:{count:'Listings',avg:'Average price (USD)',entire:'Entire home',private:'Private room',other:'Hotel/shared',regular:'Regular host',license:'License rate',access:'Geographic accessibility score (higher is more accessible)',corr:'Spearman correlation with price',score:'Average recommendation score (0–1)',priceDist:'Listings'}}
function makeCharts(){if(!window.Chart)return;Chart.defaults.font.family="'Noto Sans SC', sans-serif";Chart.defaults.color="#5F584C";let tc="#6E675C",gc="rgba(39,35,28,.08)",txt=chartText();charts.c1=new Chart(document.getElementById('c1'),{type:'bar',data:{labels:['$93.5','$94','$106','$115','$120','$126','$131','$199','$245.5','$300'],datasets:[{label:txt.count,data:[2182,3633,1856,6712,15535,805,135,2546,1757,1284],backgroundColor:'#2F7FCC',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,autoSkip:false,maxRotation:45,minRotation:45},grid:{display:false}},y:{ticks:{color:tc,callback:v=>v.toLocaleString()},grid:{color:gc},title:{display:true,text:txt.count,color:tc}}}}});charts.cp=new Chart(document.getElementById('cp'),{type:'bar',data:{labels:['Manhattan','Brooklyn','Queens','Bronx','Staten Island'],datasets:[{label:txt.entire,data:[147,138.8,132.4,143.2,148.5],backgroundColor:'#1D9E75',borderRadius:3},{label:txt.private,data:[123.1,121,113.7,121.8,113],backgroundColor:'#7F77DD',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{display:false}},y:{ticks:{color:tc,callback:v=>'$'+v},grid:{color:gc},title:{display:true,text:txt.avg,color:tc}}}}});charts.c2=new Chart(document.getElementById('c2'),{type:'bar',data:{labels:['Manhattan','Brooklyn','Queens','Bronx','Staten Island'],datasets:[{label:txt.entire,data:[64.2,48.3,36,37.5,45.5],backgroundColor:'#1D9E75'},{label:txt.private,data:[33.5,50.7,62.4,62.4,53.4],backgroundColor:'#7F77DD'},{label:txt.other,data:[2.2,1,1.6,.1,1.1],backgroundColor:'#B4B2A9'}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,min:0,max:100,ticks:{color:tc,callback:v=>v+'%'},grid:{color:gc}},y:{stacked:true,ticks:{color:tc},grid:{display:false}}}}});charts.cA1=new Chart(document.getElementById('cA1'),{type:'bar',data:{labels:[txt.entire,'Hotel room',txt.private,'Shared room'],datasets:[{label:txt.regular,data:[141.5,129.7,120.8,116.9],backgroundColor:'#B4B2A9',borderRadius:3},{label:'Superhost',data:[148.2,159.5,117.2,115.4],backgroundColor:'#1D9E75',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{display:false}},y:{ticks:{color:tc,callback:v=>'$'+v},grid:{color:gc},title:{display:true,text:txt.avg,color:tc}}}}});charts.cA2=new Chart(document.getElementById('cA2'),{data:{labels:lang==='zh'?['个人(1套)','小型(2-5)','中型(6-20)','大型职业(>20)']:['Individual (1)','Small (2-5)','Medium (6-20)','Large professional (>20)'],datasets:[{type:'bar',label:txt.avg,data:[124.3,127.9,128.8,159.2],backgroundColor:'#2F7FCC',borderRadius:3,yAxisID:'y',order:2},{type:'line',label:txt.license,data:[9.8,17.9,24.7,13],borderColor:'#D85A30',backgroundColor:'#D85A30',tension:.3,pointRadius:4,yAxisID:'y1',order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{display:false}},y:{position:'left',ticks:{color:tc,callback:v=>'$'+v},grid:{color:gc},title:{display:true,text:txt.avg,color:tc}},y1:{position:'right',min:0,max:30,ticks:{color:'#D85A30',callback:v=>v+'%'},grid:{display:false},title:{display:true,text:txt.license,color:'#D85A30'}}}}});charts.cA3=new Chart(document.getElementById('cA3'),{type:'line',data:{labels:['2.7','2.8','2.9','3.0','3.2','3.4','3.6','3.8','4.0','4.1'],datasets:[{label:txt.avg,data:[131.2,127.1,132.2,132,136.8,149.4,134.6,141.7,139.9,144.7],borderColor:'#6A5ECF',backgroundColor:'rgba(106,94,207,.12)',fill:true,tension:.3,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc},grid:{display:false},title:{display:true,text:txt.access,color:tc}},y:{ticks:{color:tc,callback:v=>'$'+v},grid:{color:gc},title:{display:true,text:txt.avg,color:tc}}}}});charts.cA4=new Chart(document.getElementById('cA4'),{type:'bar',data:{labels:lang==='zh'?['位置 location','总评 rating','清洁 cleanliness','性价比 value']:['Location','Overall rating','Cleanliness','Value'],datasets:[{label:txt.corr,data:[.120,.099,.069,.020],backgroundColor:'#2F7FCC',borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:0,max:.2,ticks:{color:tc},grid:{color:gc},title:{display:true,text:txt.corr,color:tc}},y:{ticks:{color:tc},grid:{display:false}}}}});charts.cA5=new Chart(document.getElementById('cA5'),{type:'bar',data:{labels:['Nolita','Chinatown','Little Italy','Theater District','Financial District','SoHo','Gramercy','Midtown','Greenwich Village','Battery Park City'],datasets:[{label:txt.score,data:[.764,.747,.745,.741,.739,.739,.738,.738,.737,.737],backgroundColor:'#1D9E75',borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:.70,max:.78,ticks:{color:tc},grid:{color:gc},title:{display:true,text:txt.score,color:tc}},y:{ticks:{color:tc},grid:{display:false}}}}})}
function updateCharts(){let exists=Object.keys(charts).length;if(!exists){makeCharts();return}Object.values(charts).forEach(c=>c.destroy());charts={};makeCharts();}
document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>{lang=b.dataset.lang;localStorage.setItem('airbnbLang',lang);applyI18n()}));document.getElementById('persona').addEventListener('change',()=>{populateTargets();runRecommendation()});['target','roomPref','budgetMin','budgetMax','minRating'].forEach(id=>document.getElementById(id).addEventListener('change',runRecommendation));document.getElementById('runReco').addEventListener('click',runRecommendation);applyI18n();initMap();setTimeout(runRecommendation,300)});
</script>
